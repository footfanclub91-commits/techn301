<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Techn301 — Espace Élève</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo">T301</div>
        <div style="color:white">
          <div class="h-title">Espace Élève</div>
          <div style="opacity:0.85;color:#e6eefc;font-size:13px">Consulter notes • Devoirs • Documents</div>
        </div>
      </div>
      <div class="top-controls">
        <div id="clock" class="clock">--/--/---- --:--:--</div>
        <div id="userBadge" class="user-badge">Élève</div>
        <button id="logoutBtn" class="btn muted">Déconnexion</button>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <div style="font-weight:700">Mes données</div>
          <div id="studentInfo" style="margin-top:8px"></div>
        </div>

        <div class="card" style="margin-top:12px">
          <div style="font-weight:700">Mes notes & observations</div>
          <div id="notesArea" style="margin-top:8px"></div>
        </div>

        <div class="card" style="margin-top:12px">
          <div style="font-weight:700">Devoirs</div>
          <div id="devoirsArea" style="margin-top:8px"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <div style="font-weight:700">Messagerie</div>
          <div class="chatbox" id="chatBox"></div>
          <textarea id="chatInput" rows="3" class="input" placeholder="Envoyer un message au prof..."></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="sendMsg" class="btn">Envoyer</button>
            <button id="refreshBtn" class="btn muted">Rafraîchir</button>
          </div>
        </div>

        <div class="card" style="margin-top:12px">
          <div style="font-weight:700">Documents</div>
          <div id="docList" class="fileList"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    initPage('eleve');
  </script>
</body>
</html>
