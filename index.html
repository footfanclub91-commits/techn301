<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Techn301 — Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo">T301</div>
        <div style="color:white">
          <div class="h-title">Techn301 — Connexion</div>
          <div style="opacity:0.85;color:#e6eefc;font-size:13px">Interface Poppins • Synthèse vocale</div>
        </div>
      </div>
      <div class="top-controls">
        <div id="clock" class="clock">--/--/---- --:--:--</div>
      </div>
    </div>

    <div class="card login-card">
      <div class="h1">Se connecter</div>
      <input id="loginId" class="input" placeholder="Identifiant (ex: e.benikiker)">
      <input id="loginPin" class="input" placeholder="Code PIN" type="password">
      <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
        <button id="loginBtn" class="btn">Se connecter</button>
        <button id="demoBtn" class="btn muted">Démo</button>
      </div>
      <div id="error" style="color:#ffb4b4;margin-top:10px"></div>
      <div class="footer">Utilise ton identifiant tel que dans la liste fournie. Synthèse vocale activée.</div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    updateClock();
    setInterval(updateClock,1000);
    document.getElementById('loginBtn').addEventListener('click',async()=>{
      const id=document.getElementById('loginId').value.trim();
      const pin=document.getElementById('loginPin').value.trim();
      const ok = await attemptLogin(id,pin);
      if(!ok) document.getElementById('error').innerText='Identifiant ou PIN incorrect';
    });
    document.getElementById('demoBtn').addEventListener('click',()=>attemptLogin('admindemo','2812'));
  </script>
</body>
</html>
