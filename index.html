<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Techn301</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="aurora-background"></div>

  <div id="loginScreen" class="glass-card">
    <h1>Bienvenue</h1>
    <p>Connectez-vous pour accéder à votre espace</p>
    <input type="text" id="username" placeholder="Nom d'utilisateur">
    <input type="password" id="password" placeholder="Mot de passe">
    <select id="role">
      <option value="eleve">Élève</option>
      <option value="prof">Professeur</option>
      <option value="admin">Admin</option>
    </select>
    <button class="live-button" onclick="login()">Connexion</button>
  </div>

  <div id="eleveScreen" class="glass-card hidden">
    <h2>Espace Élève</h2>
    <p id="eleveName"></p>
    <div class="stats">
      <p>Total participation : <span id="totalParticipation">0</span></p>
      <p>Bavardages : <span id="totalBavardages">0</span></p>
      <p>Agitation : <span id="totalAgitation">0</span></p>
      <p>Remarques : <span id="totalRemarques">0</span></p>
      <p>Nombre de séances : <span id="nombreSeances">0</span></p>
    </div>
    <textarea id="contestMessage" placeholder="Contester un incident..."></textarea>
    <button class="live-button" onclick="contesterIncident()">Envoyer</button>
    <h3>Messagerie</h3>
    <textarea id="mailMessage" placeholder="Écrire un message..."></textarea>
    <button class="live-button" onclick="envoyerMessage()">Envoyer au prof</button>
    <button class="live-button" onclick="reportBug()">Signaler un bug</button>
  </div>

  <div id="profScreen" class="glass-card hidden">
    <h2>Espace Professeur</h2>
    <input type="text" id="searchEleve" placeholder="Rechercher un élève..." onkeyup="searchEleve()">
    <ul id="eleveList"></ul>
    <div id="eleveDetails" class="hidden">
      <h3 id="detailName"></h3>
      <p>Dernière connexion : <span id="lastConnexion"></span></p>
      <button class="live-button" onclick="addIncident('bavardage')">+ Bavardage</button>
      <button class="live-button" onclick="addIncident('agitation')">+ Agitation</button>
      <button class="live-button" onclick="addIncident('travail')">+ Travail non fait</button>
      <textarea id="privateMessage" placeholder="Envoyer un message privé..."></textarea>
      <button class="live-button" onclick="sendPrivateMessage()">Envoyer</button>
    </div>
    <button class="live-button" onclick="reportBug()">Signaler un bug</button>
  </div>

  <div id="adminScreen" class="glass-card hidden">
    <h2>Espace Admin</h2>
    <p>Création d'élèves</p>
    <input type="text" id="newEleveName" placeholder="Nom de l'élève">
    <button class="live-button" onclick="createEleve()">Créer</button>
    <div id="adminList"></div>
    <button class="live-button" onclick="reportBug()">Signaler un bug</button>
  </div>

  <script>
    let currentUser = null;
    let data = [];

    async function loadData() {
      const response = await fetch("data.json");
      data = await response.json();
    }

    function login() {
      const role = document.getElementById("role").value;
      document.getElementById("loginScreen").classList.add("hidden");
      if (role === "eleve") {
        document.getElementById("eleveScreen").classList.remove("hidden");
        document.getElementById("eleveName").textContent = "Bonjour, " + document.getElementById("username").value;
      } else if (role === "prof") {
        document.getElementById("profScreen").classList.remove("hidden");
        afficherEleves();
      } else if (role === "admin") {
        document.getElementById("adminScreen").classList.remove("hidden");
      }
    }

    function reportBug() {
      const message = prompt("Décrivez le bug ou proposez une nouveauté :");
      if (message) {
        alert("Votre message a été envoyé à l'admin !");
      }
    }

    function contesterIncident() {
      const msg = document.getElementById("contestMessage").value;
      if (msg) {
        alert("Votre contestation a été envoyée au professeur.");
      }
    }

    function envoyerMessage() {
      const msg = document.getElementById("mailMessage").value;
      if (msg) {
        alert("Message envoyé au professeur.");
      }
    }

    function afficherEleves() {
      const ul = document.getElementById("eleveList");
      ul.innerHTML = "";
      data.forEach(eleve => {
        const li = document.createElement("li");
        li.textContent = eleve.nom;
        li.onclick = () => afficherDetails(eleve);
        ul.appendChild(li);
      });
    }

    function searchEleve() {
      const query = document.getElementById("searchEleve").value.toLowerCase();
      const ul = document.getElementById("eleveList");
      ul.innerHTML = "";
      data.filter(e => e.nom.toLowerCase().includes(query)).forEach(eleve => {
        const li = document.createElement("li");
        li.textContent = eleve.nom;
        li.onclick = () => afficherDetails(eleve);
        ul.appendChild(li);
      });
    }

    function afficherDetails(eleve) {
      document.getElementById("eleveDetails").classList.remove("hidden");
      document.getElementById("detailName").textContent = eleve.nom;
      document.getElementById("lastConnexion").textContent = eleve.derniereConnexion || "Inconnue";
    }

    function addIncident(type) {
      alert("Incident ajouté : " + type);
    }

    function sendPrivateMessage() {
      const msg = document.getElementById("privateMessage").value;
      if (msg) {
        alert("Message privé envoyé à l'élève.");
      }
    }

    function createEleve() {
      const name = document.getElementById("newEleveName").value;
      if (name) {
        data.push({ nom: name });
        afficherEleves();
        alert("Élève créé !");
      }
    }

    document.addEventListener("mousemove", (e) => {
      document.querySelectorAll(".live-button").forEach(btn => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        btn.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px) scale(1.05)`;
      });
    });

    loadData();
  </script>
</body>
</html>
