<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Techn301 — Collège Charles Péguy (v0.2)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Écran de chargement -->
<div id="loading" class="page">
  <div class="card">
    <h2>Chargement des données...</h2>
    <p>Veuillez patienter.</p>
  </div>
</div>

<!-- Page d’accueil -->
<div id="welcome" class="page hidden">
  <div class="card">
    <h1>Techn301 — Collège Charles Péguy</h1>
    <p>Bienvenue, clique ci-dessous pour accéder à l’espace de connexion.</p>
    <button id="startBtn">Entrer</button>
  </div>
</div>

<!-- Page de connexion -->
<div id="loginPage" class="page hidden">
  <div class="login-box">
    <h2>Connexion</h2>
    <form id="loginForm">
      <label for="login">Identifiant</label>
      <input type="text" id="login" placeholder="ex : e.benikiker" required>
      <label for="pin">PIN</label>
      <input type="password" id="pin" maxlength="10" required>
      <button type="submit" class="loginBtn">Se connecter</button>
    </form>
    <p id="loginError" class="error hidden">❌ Identifiant ou PIN incorrect.</p>
  </div>
</div>

<!-- Page élève -->
<div id="studentPage" class="page hidden">
  <div class="card">
    <h2 id="studentName"></h2>
    <p id="studentMessage"></p>

    <div id="changePinDiv" class="hidden">
      <label>Nouveau PIN :</label>
      <input type="password" id="newPin" maxlength="10">
      <button onclick="changePin()">Valider</button>
    </div>

    <button class="logoutBtn" onclick="logout()">Se déconnecter</button>
  </div>
</div>

<!-- Page prof -->
<div id="adminPage" class="page hidden">
  <h2>Page Prof — Gestion de la classe</h2>

  <!-- Création séance -->
  <div class="card">
    <h3>Créer une séance</h3>
    <label>Date :</label>
    <input type="date" id="seanceDate">
    <button onclick="createSeance()">Créer séance</button>
  </div>

  <!-- Liste élèves -->
  <h3>Liste des élèves</h3>
  <table>
    <thead>
      <tr><th>Nom</th><th>ID</th><th>PIN</th><th>Remarques</th><th>Actions</th></tr>
    </thead>
    <tbody id="adminTableBody"></tbody>
  </table>

  <button class="logoutBtn" onclick="logoutAdmin()">Se déconnecter</button>
</div>

<script>
// === Variables globales ===
const welcomeBtn = document.getElementById("startBtn");
const loginForm = document.getElementById("loginForm");
const loadingDiv = document.getElementById("loading");
let USERS = null;
let currentUser = null;
let seances = [];

// === Désactiver login tant que JSON pas chargé ===
loginForm.querySelector("button").disabled = true;

// === Charger le fichier JSON ===
fetch('users.json')
  .then(res => res.json())
  .then(data => {
    USERS = data;
    USERS.eleves.forEach(u => {
      const saved = localStorage.getItem(u.id);
      if(saved){
        const parsed = JSON.parse(saved);
        u.pin = parsed.pin;
        u.firstLogin = parsed.firstLogin;
        u.remarques = parsed.remarques || [];
      } else {
        u.remarques = [];
      }
    });
    USERS.eleves.sort((a,b)=>a.name.localeCompare(b.name));
    loginForm.querySelector("button").disabled = false;
    loadingDiv.style.display = "none";
    document.getElementById("welcome").classList.remove("hidden");
  })
  .catch(err => {
    alert("Erreur lors du chargement des données !");
    console.error(err);
  });

// === Navigation accueil → login ===
welcomeBtn.addEventListener("click", ()=>{
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
});

// === Connexion ===
loginForm.addEventListener("submit", function(e){
  e.preventDefault();
  if(!USERS) return alert("Les utilisateurs ne sont pas encore chargés.");

  const login = document.getElementById("login").value.trim();
  const pin = document.getElementById("pin").value.trim();

  let user = USERS.eleves.find(u=>u.id===login && u.pin===pin);
  if(!user) user = USERS.prof.find(u=>u.id===login && u.pin===pin);

  if(user){
    currentUser = user;
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("loginError").classList.add("hidden");

    if(USERS.prof.includes(user)){
      document.getElementById("adminPage").classList.remove("hidden");
      renderAdminTable();
    } else {
      document.getElementById("studentPage").classList.remove("hidden");
      document.getElementById("studentName").textContent = `Bienvenue, ${user.name.split(" ")[0]} !`;
      document.getElementById("studentMessage").textContent = `Bonjour ${user.name.split(" ")[0]}, pense à vérifier tes séances.`;

      if(user.firstLogin){
        document.getElementById("changePinDiv").classList.remove("hidden");
      }
    }
  } else {
    document.getElementById("loginError").classList.remove("hidden");
  }
});

// === Création séance ===
function createSeance(){
  const date = document.getElementById("seanceDate").value;
  if(!date) return alert("Choisissez une date !");
  seances.push(date);
  alert("Séance du "+date+" créée !");
}

// === Changement PIN élève ===
function changePin(){
  const newPin = document.getElementById("newPin").value.trim();
  if(newPin.length>=4){
    currentUser.pin=newPin;
    currentUser.firstLogin=false;
    localStorage.setItem(currentUser.id, JSON.stringify(currentUser));
    alert("PIN modifié !");
    document.getElementById("changePinDiv").classList.add("hidden");
    document.getElementById("newPin").value="";
  } else {
    alert("PIN doit faire au moins 4 caractères");
  }
}

// === Déconnexion élève ===
function logout(){
  document.getElementById("studentPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("login").value="";
  document.getElementById("pin").value="";
  document.getElementById("changePinDiv").classList.add("hidden");
}

// === Déconnexion prof ===
function logoutAdmin(){
  document.getElementById("adminPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

// === Table admin ===
function renderAdminTable(){
  const tbody = document.getElementById("adminTableBody");
  tbody.innerHTML="";
  USERS.eleves.forEach((s,i)=>{
    tbody.innerHTML+=`<tr>
      <td>${s.name}</td>
      <td>${s.id}</td>
      <td>${s.pin}</td>
      <td>
        <ul>${s.remarques.map(r=>"<li>"+r+"</li>").join("")}</ul>
        <textarea id="remarque_${i}" placeholder="Nouvelle remarque..."></textarea>
        <button onclick="addRemarque(${i})">Ajouter</button>
      </td>
      <td><button onclick="resetPin(${i})">Réinitialiser PIN</button></td>
    </tr>`;
  });
}

// === Ajouter remarque ===
function addRemarque(index){
  const textarea = document.getElementById("remarque_"+index);
  const text = textarea.value.trim();
  if(text){
    USERS.eleves[index].remarques.push(text);
    localStorage.setItem(USERS.eleves[index].id, JSON.stringify(USERS.eleves[index]));
    textarea.value="";
    renderAdminTable();
  }
}

// === Réinitialiser PIN ===
function resetPin(index){
  const newPin = prompt("Entrez un nouveau PIN pour cet élève :");
  if(newPin && newPin.length>=4){
    USERS.eleves[index].pin=newPin;
    localStorage.setItem(USERS.eleves[index].id, JSON.stringify(USERS.eleves[index]));
    renderAdminTable();
  }
}
</script>

</body>
</html>
